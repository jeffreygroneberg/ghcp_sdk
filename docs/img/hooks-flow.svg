<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Pipeline flow -->
  <rect x="20" y="70" width="110" height="60" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="75" y="95" text-anchor="middle" fill="#3fb950" font-family="system-ui" font-size="10" font-weight="600">Session Start</text>
  <text x="75" y="112" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="8">Add context</text>

  <line x1="130" y1="100" x2="155" y2="100" stroke="#58a6ff" stroke-width="1.5"/>
  <polygon points="155,95 163,100 155,105" fill="#58a6ff"/>

  <rect x="165" y="70" width="110" height="60" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="220" y="95" text-anchor="middle" fill="#58a6ff" font-family="system-ui" font-size="10" font-weight="600">User Prompt</text>
  <text x="220" y="112" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="8">Modify / filter</text>

  <line x1="275" y1="100" x2="300" y2="100" stroke="#58a6ff" stroke-width="1.5"/>
  <polygon points="300,95 308,100 300,105" fill="#58a6ff"/>

  <rect x="310" y="70" width="110" height="60" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="365" y="95" text-anchor="middle" fill="#f0883e" font-family="system-ui" font-size="10" font-weight="600">Pre-Tool Use</text>
  <text x="365" y="112" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="8">Allow / deny</text>

  <line x1="420" y1="100" x2="445" y2="100" stroke="#58a6ff" stroke-width="1.5"/>
  <polygon points="445,95 453,100 445,105" fill="#58a6ff"/>

  <rect x="455" y="70" width="110" height="60" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="510" y="95" text-anchor="middle" fill="#bc8cff" font-family="system-ui" font-size="10" font-weight="600">Post-Tool Use</text>
  <text x="510" y="112" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="8">Transform / redact</text>

  <line x1="565" y1="100" x2="590" y2="100" stroke="#58a6ff" stroke-width="1.5"/>
  <polygon points="590,95 598,100 590,105" fill="#58a6ff"/>

  <rect x="600" y="70" width="110" height="60" rx="10" fill="#161b22" stroke="#39d2c0" stroke-width="1.5"/>
  <text x="655" y="95" text-anchor="middle" fill="#39d2c0" font-family="system-ui" font-size="10" font-weight="600">Session End</text>
  <text x="655" y="112" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="8">Cleanup / audit</text>

  <!-- Error handler below -->
  <line x1="400" y1="130" x2="400" y2="155" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="340" y="155" width="120" height="35" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="400" y="177" text-anchor="middle" fill="#f85149" font-family="system-ui" font-size="10" font-weight="600">Error Handler</text>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">Hook Pipeline — intercept every step of the session lifecycle</text>
</svg>
